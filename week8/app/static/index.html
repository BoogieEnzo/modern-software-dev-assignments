<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Paper Hub - 论文知识库</title>
    <link rel="stylesheet" href="/static/styles.css?v=2">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 OS Paper Hub</h1>
            <p>个人操作系统论文知识库 + AI 辅助理解</p>
        </div>
    </header>

    <nav class="container">
        <div class="tabs">
            <button class="tab active" data-tab="search"><span>🔍</span> 搜索 ArXiv</button>
            <button class="tab" data-tab="papers"><span>📄</span> 论文列表</button>
        </div>
    </nav>

    <main class="container">
        <!-- Search Tab: 干净搜索框 -->
        <section id="search-tab" class="tab-content active">
            <div class="search-box standalone">
                <input type="text" id="arxiv-search-input" placeholder="输入关键词搜索 ArXiv 论文...">
                <button id="arxiv-search-btn" class="btn-primary">🔍 搜索</button>
            </div>
            <div id="search-results" class="search-results-list"></div>
        </section>

        <!-- Papers Tab: 论文列表（一行一条）；全站对话固定右下角 -->
        <section id="papers-tab" class="tab-content">
            <div class="papers-section">
                <div id="papers-list" class="papers-table-wrap">
                    <div class="loading">正在加载论文...</div>
                </div>
            </div>
            <div class="station-chat-section station-chat-fixed">
                <span class="station-chat-title">全站对话</span>
                <div id="station-chat-messages" class="chat-messages"></div>
                <div class="chat-input-row">
                    <input type="text" id="station-chat-input" placeholder="输入问题，与 Ollama 对话...">
                    <button id="station-chat-send" class="btn-primary">发送</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Paper Detail Modal -->
    <div id="paper-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="paper-detail"></div>
        </div>
    </div>

    <script src="/static/app.js?v=2"></script>
</body>
</html>
